<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBBank GreenBoard 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 3C7 3 4.5 5.5 4.5 9c0 2.2 1.1 4.2 2.8 5.4l.9-2.2C7.1 11.3 6.5 10.2 6.5 9c0-1.9 1.6-4 3.5-4s3.5 2.1 3.5 4c0 1.2-.6 2.3-1.7 3.2l.9 2.2C14.4 13.2 15.5 11.2 15.5 9c0-3.5-2.5-6-5.5-6z" fill="white"/>
        <path d="M10 10v7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>

    <div>
      <div class="header-title">BBBank GreenBoard</div>
      <div class="header-sub">nextGen fürs Klima · Wettbewerb 2026</div>
    </div>
  </div>

  <div class="kw-badge" id="kwBadge">KW –</div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showTab('rangliste', this)">🏆 Rangliste</button>
  <button class="nav-tab" onclick="showTab('challenges', this)">⚡ Challenges</button>
  <button class="nav-tab" onclick="showTab('tipps', this)">💡 Tipps & Tricks</button>
  <button class="nav-tab" onclick="showTab('punktesystem', this)">📋 Punktesystem</button>
</nav>

<main class="main">

  <div id="tab-rangliste" class="tab-content active">

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Gesamtpunkte</div>
        <div class="metric-value" id="mTotal">–</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Teilnehmende</div>
        <div class="metric-value" id="mPeople">–</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">CO₂ gespart</div>
        <div class="metric-value" id="mCO2">–</div>
      </div>

      <div class="metric-card gold">
        <div class="metric-label">Führende Abteilung</div>
        <div class="metric-value" id="mLeader">–</div>
      </div>
    </div>

    <div id="leaderboard"></div>

    <input type="file" id="fileInput" onchange="handleFile(event)">
    <div id="fileStatus"></div>

  </div>

  <div id="tab-challenges" class="tab-content">...</div>
  <div id="tab-tipps" class="tab-content">...</div>
  <div id="tab-punktesystem" class="tab-content">...</div>

</main>

<script src="script.js"></script>
</body>
</html>
